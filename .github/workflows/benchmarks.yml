# Benchmark Tracking
#
# Runs benchmarks on every push to main and compares with the base branch.
# Results are posted as PR comments showing performance regressions.

name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          cargo bench --workspace --bench "*" -- --output-format bencher | tee benchmark-output.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: PQCrypto-RS Benchmarks
          tool: cargo
          output-file-path: benchmark-output.txt
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: "@PhantomHase"

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-output.txt
