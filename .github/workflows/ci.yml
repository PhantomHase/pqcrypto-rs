# CI Pipeline for PQCrypto-RS
#
# Runs on every push to main and on all pull requests.
# Validates: build, test, lint, format, coverage, docs.
#
# Platforms: Linux, macOS, Windows
# Rust versions: stable, MSRV (1.75.0)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────
  # Format check (fast, runs first)
  # ─────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ─────────────────────────────────────────────
  # Clippy lint (fast, runs in parallel with fmt)
  # ─────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ─────────────────────────────────────────────
  # Build matrix: OS x Rust version
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: "1.75.0"  # MSRV
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
      - run: cargo build --workspace --all-targets
      - run: cargo build --workspace --release

  # ─────────────────────────────────────────────
  # Tests (runs after build succeeds)
  # ─────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.os }}, ${{ matrix.rust }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: "1.75.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
      - run: cargo test --workspace --all-targets -- --nocapture
      - run: cargo test --workspace --doc

  # ─────────────────────────────────────────────
  # Documentation build
  # ─────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ─────────────────────────────────────────────
  # Code coverage with cargo-tarpaulin
  # ─────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: |
          cargo tarpaulin \
            --workspace \
            --out xml \
            --output-dir coverage \
            --engine llvm \
            --timeout 300 \
            --skip-clean

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        run: |
          cargo tarpaulin \
            --workspace \
            --skip-clean \
            --engine llvm \
            --timeout 300 \
            2>&1 | tail -20

  # ─────────────────────────────────────────────
  # MSRV check (Minimum Supported Rust Version)
  # ─────────────────────────────────────────────
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-targets

  # ─────────────────────────────────────────────
  # No-std check (optional, for core crate)
  # ─────────────────────────────────────────────
  no_std:
    name: no_std Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      # pqcrypto-core should be no_std compatible
      - run: cargo check -p pqcrypto-core --target thumbv7em-none-eabihf

  # ─────────────────────────────────────────────
  # Cross-platform binary test
  # ─────────────────────────────────────────────
  cli-test:
    name: CLI Binary Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p pqcrypto-cli

      - name: Test CLI help
        run: cargo run --release -p pqcrypto-cli -- --help

      - name: Test keygen
        run: |
          cargo run --release -p pqcrypto-cli -- keygen
          ls -la kem_public.key kem_secret.key sign_public.key sign_secret.key 2>/dev/null || dir kem_public.key 2>nul

  # ─────────────────────────────────────────────
  # Dependency audit
  # ─────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
