# Release Automation
#
# Triggered on version tags (v*). Builds release binaries,
# creates GitHub release, and optionally publishes to crates.io.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # Validate the release
  # ─────────────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run full test suite
        run: cargo test --workspace --all-targets

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Verify version tag matches Cargo.toml
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "✓ Version match: $TAG_VERSION"

  # ─────────────────────────────────────────────
  # Build release binaries for all platforms
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pqcrypto-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pqcrypto-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pqcrypto-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pqcrypto-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pqcrypto-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p pqcrypto-cli --target ${{ matrix.target }}
          else
            cargo build --release -p pqcrypto-cli --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pqcrypto ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pqcrypto.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "## What's Changed" > notes.md
            echo "" >> notes.md
            git log --oneline --no-decorate >> notes.md
          else
            echo "## What's Changed" > notes.md
            echo "" >> notes.md
            git log ${PREV_TAG}..HEAD --oneline --no-decorate >> notes.md
          fi
          echo "" >> notes.md
          echo "## Installation" >> notes.md
          echo '```bash' >> notes.md
          echo "# Linux (amd64)" >> notes.md
          echo "curl -L https://github.com/PhantomHase/pqcrypto-rs/releases/latest/download/pqcrypto-linux-amd64 -o pqcrypto" >> notes.md
          echo "chmod +x pqcrypto" >> notes.md
          echo "" >> notes.md
          echo "# macOS (Apple Silicon)" >> notes.md
          echo "curl -L https://github.com/PhantomHase/pqcrypto-rs/releases/latest/download/pqcrypto-macos-arm64 -o pqcrypto" >> notes.md
          echo "chmod +x pqcrypto" >> notes.md
          echo '```' >> notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            artifacts/pqcrypto-linux-amd64/pqcrypto-linux-amd64
            artifacts/pqcrypto-linux-arm64/pqcrypto-linux-arm64
            artifacts/pqcrypto-macos-amd64/pqcrypto-macos-amd64
            artifacts/pqcrypto-macos-arm64/pqcrypto-macos-arm64
            artifacts/pqcrypto-windows-amd64.exe/pqcrypto-windows-amd64.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}

  # ─────────────────────────────────────────────
  # Publish to crates.io (optional, manual gate)
  # ─────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'rc') && !contains(github.ref, 'beta') && !contains(github.ref, 'alpha')"
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish pqcrypto-core
        run: cargo publish -p pqcrypto-core --token ${{ secrets.CARGO_TOKEN }} || true
        continue-on-error: true

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish pqcrypto-kem
        run: cargo publish -p pqcrypto-kem --token ${{ secrets.CARGO_TOKEN }} || true
        continue-on-error: true

      - name: Publish pqcrypto-sign
        run: cargo publish -p pqcrypto-sign --token ${{ secrets.CARGO_TOKEN }} || true
        continue-on-error: true

      - name: Publish pqcrypto-cli
        run: cargo publish -p pqcrypto-cli --token ${{ secrets.CARGO_TOKEN }} || true
        continue-on-error: true
